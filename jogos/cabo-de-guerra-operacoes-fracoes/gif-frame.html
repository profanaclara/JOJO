<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabo de Guerra Animado</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            display: grid;
            place-items: center;
        }

        img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            background: transparent;
            user-select: none;
            pointer-events: none;
            transform: scale(1.1);
            transform-origin: center center;
        }
    </style>
</head>
<body>
    <img id="gif" src="./assets/cabo-de-guerra-2.gif" alt="Cabo de guerra">
    <script>
        const gif = document.getElementById("gif");
        const BASE_SRC = "./assets/cabo-de-guerra-2.gif";
        const LOOP_MS = 7000;
        let restartTimer = null;

        function restartGif() {
            gif.src = `${BASE_SRC}?t=${Date.now()}`;
        }

        restartTimer = window.setInterval(restartGif, LOOP_MS);
    </script>
</body>
</html>
