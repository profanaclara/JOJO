<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#dbe9ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JOJO">
    <title>JOJO | Plataforma Educativa</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css?v=6">
</head>
<body>
    <div class="app-shell">
        <main class="app-screen">
            <header class="brand-hero">
                <img
                    class="brand-hero__logo brand-hero__logo--horizontal"
                    src="./assets/jojo-horizontal.svg"
                    alt="JOJO"
                >
            </header>

            <section class="home-actions" aria-label="Acesso rápido da plataforma">
                <button class="home-action home-action--games" type="button" data-section="games">
                    <img class="home-action__icon home-action__icon--controle" src="./assets/controle.svg" alt="" aria-hidden="true">
                    <span class="home-action__label">Jogos</span>
                </button>
                <button class="home-action home-action--tools" type="button" data-section="tools">
                    <img class="home-action__icon home-action__icon--cerebro" src="./assets/cerebro.png" alt="" aria-hidden="true">
                    <span class="home-action__label">Ferramentas</span>
                </button>
            </section>

            <button id="installAppBtn" class="install-app-button" type="button" aria-label="Baixar app JOJO" title="Baixar app JOJO">
                <img class="install-app-button__icon" src="./assets/JOJOdownloadsemfundo.svg" alt="" aria-hidden="true">
                <span>Baixar App</span>
            </button>

            <footer class="app-footer" aria-label="Créditos da plataforma">
                <img
                    class="app-footer__logo"
                    src="./assets/logo-profanapixelart.png"
                    alt="Logo Ana Clara Silva de Lima"
                >
                <p>Desenvolvido por Ana Clara Silva de Lima</p>
            </footer>
        </main>

        <div id="sheetBackdrop" class="sheet-backdrop hidden"></div>

        <section
            id="appSheet"
            class="app-sheet"
            aria-hidden="true"
            aria-labelledby="sheetTitle"
        >
            <div class="sheet-handle" aria-hidden="true"></div>

            <header class="sheet-header">
                <div>
                    <p id="sheetEyebrow" class="sheet-header__eyebrow"></p>
                    <h2 id="sheetTitle"></h2>
                </div>
                <button id="sheetCloseBtn" class="icon-button" type="button" aria-label="Fechar painel">×</button>
            </header>

            <div id="sheetTabs" class="sheet-tabs hidden" role="tablist" aria-label="Categorias da seção"></div>
            <div id="sheetContent" class="sheet-content"></div>
        </section>
    </div>

    <script src="./scripts/data.js"></script>
    <script src="./scripts/app.js"></script>
    <script src="./scripts/pwa.js?v=13"></script>
</body>
</html>
